# DPO (Direct Preference Optimization) Configuration
# Applied after QLoRA SFT to align the model with safety preferences.
# Goal: model refuses to hallucinate pricing/data instead of making things up.

base_model:
  adapter_path: "checkpoints/lora_adapters"  # SFT adapter from stage 1-3
  # Merged model alternative:
  # merged_path: "checkpoints/merged_fp16"

dpo:
  beta: 0.1                               # Temperature for preference strength
  # Lower beta = stronger preference signal
  # Higher beta = closer to reference model

  # Loss type
  loss_type: "sigmoid"                    # Standard DPO loss

  # Data construction
  max_prompt_length: 1024
  max_completion_length: 1024
  max_length: 2048                        # Total: prompt + chosen/rejected

  # Chosen/Rejected pair semantics:
  #   chosen  → Safe Refusal ("I don't have that pricing data, let me connect you...")
  #   rejected → Hallucination / Fabrication ("The price for exosome RNA-seq is ¥800...")
  # The model learns that admitting ignorance is preferred over making things up.

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16         # Effective batch size = 16
  learning_rate: 5.0e-5                   # Lower LR for preference tuning
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  num_train_epochs: 1                     # One pass — DPO converges fast

  # Memory
  gradient_checkpointing: true
  optim: "adamw_8bit"
  bf16: true

  # Logging
  logging_steps: 5
  save_steps: 100
  save_total_limit: 2
  report_to: "none"

dataset:
  dpo_samples: 400                        # 400 chosen/rejected pairs
  # Construction:
  #   40% — Pricing hallucination refusals
  #   30% — Protocol/SOP hallucination refusals
  #   20% — Out-of-scope query refusals
  #   10% — Format-correct refusals (model gave right refusal but wrong tone)
  val_split: 0.10
  shuffle: true
  seed: 42

output:
  dpo_adapter_dir: "checkpoints/dpo_adapters"
  final_merged_dir: "checkpoints/dpo_merged_fp16"
