# Deployment Configuration
# vLLM + AWQ INT4 deployment on single RTX 4090 24G.

model:
  # Base model (pre-merge)
  base_model: "Qwen/Qwen2.5-14B-Instruct"
  # Merged FP16 model path (output of merge_and_export.py)
  merged_model_path: "checkpoints/dpo_merged_fp16"
  # AWQ-quantized output path
  quantized_model_path: "checkpoints/awq_int4"

quantization:
  method: "awq"                       # Activation-aware Weight Quantization
  bits: 4                             # INT4
  group_size: 128                     # Group size for quantization
  zero_point: true                    # Asymmetric quantization
  # AWQ preserves quality better than GPTQ for small models (<30B)

vllm:
  model_path: "checkpoints/awq_int4"
  host: "0.0.0.0"
  port: 8000
  api_key: null                       # No auth for local deployment

  # Memory limits (RTX 4090 24G)
  max_model_len: 8192                 # Max context length (KV cache budget)
  gpu_memory_utilization: 0.90       # Leave 10% for runtime overhead
  max_num_seqs: 4                     # Max concurrent sequences
  max_num_batched_tokens: 8192        # Max tokens in a batch

  # Performance
  dtype: "auto"                       # Auto-detect (float16)
  enforce_eager: false                # Use CUDA graph for speed
  enable_prefix_caching: true         # Cache KV for repeated prefixes

  # Quantization flags
  quantization: "awq"

docker:
  base_image: "nvidia/cuda:12.1-runtime-ubuntu22.04"
  python_version: "3.10"
  vllm_version: "0.6.0"
  expose_port: 8000

vram_budget:
  # RTX 4090 24G breakdown for Qwen2.5-14B-AWQ-INT4
  gpu_total_gb: 24.0
  model_weights_gb: 7.0               # 14B × 4 bits / 8
  kv_cache_gb: 8.0                    # 8K context with PagedAttention
  runtime_overhead_gb: 5.0            # LangGraph + vLLM runtime
  # Total: ~20 GB → fits in 24 GB with ~4 GB headroom
